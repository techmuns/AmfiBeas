name: Runner test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hello-2204:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - run: echo "hello from ubuntu-22.04 at $(date -u)"
  hello-2404:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: echo "hello from ubuntu-24.04 at $(date -u)"
  hello-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "hello from ubuntu-latest at $(date -u)"
