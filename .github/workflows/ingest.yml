name: Ingest data

on:
  # Weekly: Mondays 02:30 UTC. New quarterly disclosures from screener.in
  # and AMFI typically appear within a few weeks of quarter end; weekly
  # cadence picks them up promptly without thrashing rate limits.
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install pdf-parse for management-yields ingester
        # Installed inline so it never reaches the production / Cloudflare
        # Workers builds — those run `npm ci` and the lockfile must stay
        # clean. --no-save keeps package.json untouched.
        run: npm install --no-save pdf-parse@1.1.1
      - name: Run ingest
        env:
          # AAUM_DEBUG_ONE_QUARTER: set to "1" to limit AAUM ingestion to a
          # single quarter with verbose diagnostics. Empty / unset = run the
          # full multi-quarter window with compact per-quarter summaries.
          AAUM_DEBUG_ONE_QUARTER: ""
          # Morningstar India is opt-in. Set to "1" to enable the public-pages
          # fetch. Leave empty / unset to skip cleanly. Uses public surfaces
          # only; never bypasses login, captchas, paywalls, or bot protection.
          MORNINGSTAR_FETCH_ENABLED: ""
        run: npm run ingest
      - name: Show diff
        run: |
          git diff --stat src/data/snapshots || true
      - name: Commit snapshots
        run: |
          if [ -z "$(git status --porcelain src/data/snapshots)" ]; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots
          git commit -m "chore(data): refresh AMFI snapshots ($(date -u +%Y-%m-%d))"
          git push
