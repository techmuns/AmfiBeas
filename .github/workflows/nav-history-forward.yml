name: NAV history forward refresh (manual)

# MANUAL daily forward NAV refresh — Phase 3.9C.
# workflow_dispatch only; NO schedule (scheduling lands in Phase 3.9D
# after a clean manual production run has been verified).
#
# Reads the already-committed src/data/snapshots/mf-latest-nav.json
# (refreshed daily by nav-latest.yml) and appends the latest NAV onto
# each fund's existing public/nav-history/{schemecode}.json.
#
#   commit = false (default) → DRY RUN: simulate in memory; write a
#     dry-run report + sample proposed merged files + proposed
#     periodCoverage summaries under data/debug/ (gitignored), uploaded
#     as artifacts. NEVER touches public/nav-history/ or
#     src/data/snapshots/. No commit.
#
#   commit = true → PRODUCTION: the script runs with
#     NAV_HISTORY_FORWARD_WRITE_MODE=production and (when all guardrails
#     pass) atomic-writes only the CHANGED per-fund history files, then
#     the manifest, then regenerates mf-returns.json +
#     mf-category-returns.json. The commit step lands exactly those four
#     paths IF the script exited cleanly. Keep-last-good: a non-zero exit
#     blocks the commit and the ephemeral runner is discarded.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this? (optional)"
        required: false
        type: string
      commit:
        description: "false = dry run (artifact only; DEFAULT). true = production write (append changed history + manifest + returns + category) and commit."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# contents:write needed only when commit=true; harmless for dry runs.
permissions:
  contents: write

concurrency:
  group: nav-history-forward-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forward:
    runs-on: ubuntu-22.04
    # Forward append reads ~1,036 small history files, writes the changed
    # subset, then regenerates returns + category (a few minutes each).
    # 30-minute ceiling for comfortable headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run forward refresh (mode = ${{ inputs.commit == 'true' && 'production' || 'dryrun' }})
        # The script exits non-zero on any guardrail failure OR an
        # incomplete production write (partial per-fund writes, or a failed
        # returns/category regeneration). continue-on-error keeps the
        # artifact-upload steps reachable so a partial diagnostic is always
        # preserved. The commit step has NO continue-on-error and is gated
        # on this step's success (see its `if:`), so a non-zero exit blocks
        # the commit.
        id: run
        continue-on-error: true
        env:
          NAV_HISTORY_FORWARD_WRITE_MODE: ${{ inputs.commit == 'true' && 'production' || 'dryrun' }}
        run: npm run ingest:nav:forward
      - name: Upload dry-run report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nav-history-forward-dryrun-report
          path: data/debug/nav-history-forward-dryrun-report.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload proposed snapshot summaries
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nav-history-forward-snapshot-summaries
          path: |
            data/debug/mf-returns-forward-summary.json
            data/debug/mf-category-returns-forward-summary.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload sample proposed merged files
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nav-history-forward-sample-files
          path: data/debug/sample-nav-history-forward/
          if-no-files-found: warn
          retention-days: 14
      - name: Commit production data
        # Runs ONLY when commit=true AND the forward script exited 0 (all
        # guardrails passed AND the production write + both regenerations
        # completed). Commits exactly the four production paths. If git has
        # no changes (e.g. a no-op run where no fund advanced), the step is
        # a clean no-op.
        if: ${{ inputs.commit == 'true' && steps.run.outcome == 'success' }}
        run: |
          if [ -z "$(git status --porcelain public/nav-history src/data/snapshots/mf-history-manifest.json src/data/snapshots/mf-returns.json src/data/snapshots/mf-category-returns.json)" ]; then
            echo "No forward-refresh changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/nav-history src/data/snapshots/mf-history-manifest.json src/data/snapshots/mf-returns.json src/data/snapshots/mf-category-returns.json
          git commit -m "chore(data): daily forward NAV refresh"
          git push
      - name: Fail the job if the run failed
        # Propagate the script's exit status so a guardrail/production-write
        # failure shows the run as red (rather than green via
        # continue-on-error). The artifacts above were already uploaded.
        if: ${{ steps.run.outcome == 'failure' }}
        run: exit 1
