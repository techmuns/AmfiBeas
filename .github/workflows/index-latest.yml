name: NIFTY 500 latest snapshot (daily)

# Daily latest-index fetcher — Phase 3.10D.
#
# Trigger model:
#   • schedule (cron) — daily 17:00 UTC (22:30 IST). Indian markets close
#     at 15:30 IST (10:00 UTC); NSE publishes the daily ind_close_all CSV
#     within 1–2 hours of close, so 17:00 UTC leaves a ~7-hour buffer.
#     Offset by 3 hours BEFORE nav-latest's 20:00 UTC cron so the two
#     pipelines never collide on the same minute. If today's CSV isn't
#     published yet (delays do happen on volatile days), the script's
#     INDEX_LATEST_LOOKBACK_DAYS=7 walk-back transparently lands on the
#     most recent published date.
#   • workflow_dispatch — manual run preserved, with the same inputs the
#     pre-3.10D version had (target_date / lookback_days / commit).
#
# Runs scripts/ingest/index-latest.ts (NSE archives ind_close_all_*.csv),
# uploads the snapshot as an artifact, and — matching nav-latest.yml's
# convention — commits src/data/snapshots/index-latest.json when changed.
# Keep-last-good: the script exits non-zero WITHOUT writing if every
# candidate date in the lookback window fails, so a degraded snapshot can
# never be committed.

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this? (optional)"
        required: false
        type: string
      target_date:
        description: "Override target date as YYYY-MM-DD (optional). Default: today's IST date."
        required: false
        type: string
      lookback_days:
        description: "How many calendar days to walk back if today's CSV isn't published yet (default 7)."
        required: false
        default: "7"
        type: string
      commit:
        description: "true = commit + push the snapshot when it changed (default). false = artifact only. Ignored for the scheduled run, which always commits when changed."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: index-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  index-latest:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fetch latest NIFTY 500 snapshot
        env:
          INDEX_LATEST_DATE: ${{ inputs.target_date }}
          INDEX_LATEST_LOOKBACK_DAYS: ${{ inputs.lookback_days }}
        run: npm run ingest:index:latest
      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-latest
          path: src/data/snapshots/index-latest.json
          if-no-files-found: warn
          retention-days: 14
      - name: Commit snapshot
        # Always commit on the scheduled run; honour the toggle on manual
        # dispatch (default true). Runs only after a successful fetch (npm
        # above is a hard gate; non-zero exit fails the job before this).
        if: ${{ github.event_name == 'schedule' || inputs.commit == 'true' }}
        run: |
          if [ -z "$(git status --porcelain src/data/snapshots/index-latest.json)" ]; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/index-latest.json
          git commit -m "chore(data): refresh NIFTY 500 latest snapshot ($(date -u +%Y-%m-%d))"
          git push
