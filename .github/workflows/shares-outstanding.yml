name: Shares outstanding (cap-flows %)

# Refreshes the shares-outstanding feed that powers the "% of shares
# outstanding" column on the Overview buy/sell cards. Runs the chain:
#   build:cap-flows         → surface the ~30 companies + their fincodes
#   ingest:shares-outstanding → scrape screener.in for the missing/stale names
#   build:cap-flows         → re-build to attach pctOutstanding
# then commits the two JSON files when anything changed.
#
# Monthly cadence (the holdings the cap flows derive from update monthly).
# Auto-runs right after "Schemewise holdings (monthly)" finishes (workflow_run),
# so a new month's holdings immediately get their shares-outstanding %. Also
# runnable on demand from the Actions tab.

on:
  workflow_run:
    workflows: ["Schemewise holdings (monthly)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: shares-outstanding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shares-outstanding:
    # On workflow_run, only proceed if the holdings refresh succeeded; a manual
    # dispatch always runs.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out in detached HEAD by default; pin to the
          # branch (main, from the holdings run) so the commit step can push.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Rebuild cap-flows (surface target companies)
        run: npm run build:cap-flows
      - name: Fetch shares outstanding from screener.in
        run: npm run ingest:shares-outstanding
      - name: Rebuild cap-flows (attach pctOutstanding)
        run: npm run build:cap-flows
      - name: Rebuild fund-wise (AMC-level) portfolios
        run: npm run build:fundwise
      - name: Rebuild Insights inputs (uniques + share shifts)
        run: npm run build:insights
      - name: Rebuild gross sector flows
        run: npm run build:sector-gross
      - name: Show diff
        run: git diff --stat src/data/portfolio-tracker public/fundwise || true
      - name: Commit data
        run: |
          FILES="src/data/portfolio-tracker/shares-outstanding.json src/data/portfolio-tracker/cap-flows.json src/data/portfolio-tracker/fundwise-index.json src/data/portfolio-tracker/insights-holdings.json src/data/portfolio-tracker/sector-gross-flows.json public/fundwise"
          if [ -z "$(git status --porcelain $FILES)" ]; then
            echo "No shares-outstanding / cap-flows / fundwise changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "chore(data): refresh shares-outstanding + cap-flows % + fund-wise portfolios ($(date -u +%Y-%m-%d))"
          git push
