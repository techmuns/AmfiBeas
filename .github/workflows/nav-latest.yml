name: NAV latest snapshot (daily)

# Daily latest-NAV refresh (Phase 3.1B). Runs scripts/ingest/nav-latest.ts
# (AMFI NAVAll + shared crosswalk + curated overrides), uploads the snapshot
# as an artifact, and — matching the existing ingest.yml convention — commits
# src/data/snapshots/mf-latest-nav.json to the branch when it changes.
#
# Safety: production set is exact + high + override only; the script
# keeps-last-good (exits non-zero WITHOUT writing) if the AMFI feed is
# unreachable OR if any production guardrail fails (funds floor, ≥95% holdings
# coverage, overrides loaded). A failed generate step halts the job before the
# commit step, so a degraded snapshot can never be committed.

on:
  # PAUSED: NAV now comes from the mf-data bulk CSVs (built by
  # scripts/ingest/nav-history-from-mfdata.ts), which emit BOTH the Regular
  # and Direct plan series. This live-AMFI daily refresh writes only a
  # single-plan mf-latest-nav.json, so leaving it scheduled would clobber the
  # mf-data snapshots and break the Trends plan toggle. The daily-update path
  # will be re-pointed at the new source separately; until then this runs on
  # manual dispatch only (and nav-history-forward, which chains off this
  # workflow's completion, no longer auto-runs either).
  # schedule:
  #   - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit the snapshot to the branch? (false = artifact only)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: nav-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nav-latest:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate latest NAV snapshot
        run: npm run ingest:nav:latest
      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mf-latest-nav
          path: src/data/snapshots/mf-latest-nav.json
          if-no-files-found: warn
          retention-days: 14
      - name: Commit snapshot
        # Scheduled runs always commit (no inputs on a cron trigger); manual
        # runs honour the commit toggle (default true, false = artifact only).
        # This step only runs when the prior generate step SUCCEEDED, so a
        # guardrail/fetch failure (non-zero exit) skips the commit entirely.
        if: ${{ github.event_name == 'schedule' || inputs.commit == 'true' }}
        run: |
          if [ -z "$(git status --porcelain src/data/snapshots/mf-latest-nav.json)" ]; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/mf-latest-nav.json
          git commit -m "chore(data): refresh latest mutual fund NAV snapshot ($(date -u +%Y-%m-%d))"
          git push
