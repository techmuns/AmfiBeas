name: Audit Top-7 Factsheets

# Manual-only audit workflow. Drives scripts/ingest/amc-factsheet-
# performance.ts (top-7 aggregate added in PR #88) on a network-
# enabled GitHub Actions runner so we can verify the per-AMC fetch
# + parse end-to-end for all 7 strategies (SBI, ICICI Pru, HDFC,
# Nippon, Kotak, ABSL, UTI) without local setup.
#
# Audit-only:
#   - no production snapshot is written
#   - no dashboard UI is touched
#   - the only file the workflow may commit back is
#     manual-data/audit/top7-scheme-outperformance-poc.json

on:
  workflow_dispatch:
    inputs:
      period:
        description: "Optional period/month, e.g. 2026-03. Leave blank for each strategy's latest."
        required: false
        default: ""
      write:
        description: "Write audit JSON (1 = yes, 0 = dry run)"
        required: true
        default: "1"

permissions:
  contents: write
  actions: read

concurrency:
  group: audit-top7-factsheets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run top-7 factsheet audit
        env:
          TOP7_FACTSHEET_PERIOD: ${{ inputs.period }}
          TOP7_FACTSHEET_WRITE: ${{ inputs.write }}
        run: npm run audit:top7-factsheets

      - name: List audit directory
        if: always()
        run: ls -la manual-data/audit/ || true

      - name: Upload audit JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top7-factsheets-audit
          path: manual-data/audit/top7-scheme-outperformance-poc.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit audit JSON if updated
        if: inputs.write != '0'
        run: |
          if [ -z "$(git status --porcelain manual-data/audit/top7-scheme-outperformance-poc.json)" ]; then
            echo "No audit JSON changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manual-data/audit/top7-scheme-outperformance-poc.json
          git commit -m "chore(audit): update top-7 factsheet outperformance audit"
          git push
