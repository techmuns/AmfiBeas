name: AMC monthly portfolio fetch

# AMC monthly portfolio disclosures → public/amc-holdings/, via the AdvisorKhoj
# aggregator (one curl-able code path for all ~50 AMCs; see run-monthly.ts).
# Runs once a day on the 9th–12th of each month (the window in which most AMCs
# publish the prior month's disclosure), plus manual dispatch. AMCs with a
# directly-downloadable disclosure are fetched with plain curl; AMCs behind a
# JS landing page or Akamai bot wall fall through to a headless-Chromium tier
# (browser-fallback.ts), which needs Playwright's browser installed. Any AMC
# still unresolved is recorded in index.json with a non-ok status rather than
# dropped silently. Commits refreshed snapshots.

on:
  schedule:
    - cron: "0 7 9-12 * *" # 07:00 UTC, days 9–12, every month
  workflow_dispatch:
    inputs:
      amcs:
        description: "Comma-separated AMC slugs to fetch (blank = all). Sets AMC_ONLY for targeted iteration."
        required: false
        type: string
      commit:
        description: "Commit results. Set to 'false' for a test run (fetch + log only; never commits a filtered index.json)."
        required: false
        default: "true"
        type: string

permissions:
  contents: write

concurrency:
  group: amc-monthly-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium (browser fallback tier)
        run: npx playwright install --with-deps chromium
      - name: Fetch + parse AMC monthly portfolios
        env:
          AMC_ONLY: ${{ inputs.amcs }}
        run: npx tsx scripts/ingest/amc-factsheets/run-monthly.ts
      - name: Rebuild AMC-direct tracker (universe + panels + crosswalk)
        # The MFs Portfolio Tracker is sourced entirely from AMC-direct filings
        # (build-amc-direct-tracker.ts). Safe after a filtered run too:
        # run-monthly MERGES index.json, and the builder reads ALL committed
        # amc-holdings files, so the universe/crosswalk stay complete.
        if: ${{ github.event_name == 'schedule' || inputs.commit != 'false' }}
        run: npm run build:amc-direct
      - name: Commit refreshed AMC holdings + tracker data
        # commit=false → test run (fetch + log only). A filtered run commits
        # safely because index.json is merged, not overwritten.
        if: ${{ github.event_name == 'schedule' || inputs.commit != 'false' }}
        run: |
          PATHS="public/amc-holdings public/amc-portfolio public/holdings-direct src/data/portfolio-tracker/amc-portfolio-crosswalk.json src/data/portfolio-tracker/amc-direct-index.json"
          if [ -z "$(git status --porcelain $PATHS)" ]; then
            echo "No AMC holdings / crosswalk changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $PATHS
          git commit -m "chore(data): AMC monthly portfolio fetch ($(date -u +%Y-%m-%d))"
          git push
