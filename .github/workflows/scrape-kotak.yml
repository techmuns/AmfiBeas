name: Scrape Kotak (one-off)

# One-off: scrape RupeeVest's Portfolio Tracker for a single fund's equity
# holdings on a GitHub-hosted runner (which has open internet), then commit
# the CSV/JSON + diagnostics back to this branch. Triggered by pushing the
# scraper/workflow themselves; the data-only commit back does NOT re-trigger
# (paths filter), avoiding a loop. Delete after use.

on:
  push:
    branches: [claude/stoic-fermi-HC5aq]
    paths:
      - "scripts/scrape-kotak.ts"
      - ".github/workflows/scrape-kotak.yml"
  workflow_dispatch:
    inputs:
      fund:
        description: "Fund name as it appears on the tracker"
        required: false
        default: "Kotak Arbitrage Fund(G)"
        type: string

permissions:
  contents: write

concurrency:
  group: scrape-kotak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/stoic-fermi-HC5aq
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Run scraper
        env:
          FUND_NAME: ${{ github.event.inputs.fund || 'Kotak Arbitrage Fund(G)' }}
        run: npx tsx scripts/scrape-kotak.ts
      - name: Show scraper log
        if: always()
        run: cat scrape-debug/log.txt || true
      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "data(scrape): Kotak Arbitrage equity holdings + scrape diagnostics"
          git push origin HEAD:claude/stoic-fermi-HC5aq
